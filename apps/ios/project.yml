name: MarketingClaw
options:
  bundleIdPrefix: ai.marketingclaw
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "26.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  MarketingClawKit:
    path: ../shared/MarketingClawKit
  Swabble:
    path: ../swabble
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    exactVersion: 147.0.0

schemes:
  MarketingClaw:
    shared: true
    build:
      targets:
        MarketingClaw: all
    test:
      targets:
        - MarketingClawTests
        - MarketingClawLogicTests
  MarketingClawLogicTests:
    shared: true
    build:
      targets:
        MarketingClawLogicTests: all
    test:
      targets:
        - MarketingClawLogicTests
  MarketingClawUITests:
    shared: true
    build:
      targets:
        MarketingClawUITests: all
    test:
      targets:
        - MarketingClawUITests
  MarketingClawWatchApp:
    shared: true
    build:
      targets:
        MarketingClawWatchApp: all

targets:
  MarketingClaw:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
      - path: Resources/Licenses
        type: folder
        buildPhase: resources
      - path: Sources/Fonts
        buildPhase: resources
      - path: Resources/Localizable.xcstrings
        buildPhase: resources
    dependencies:
      - target: MarketingClawShareExtension
        embed: true
      - target: MarketingClawActivityWidget
        embed: true
      # A companion watch application belongs in the standard Watch bundle location.
      # PlugIns is for extension products and breaks paired watch installation.
      - target: MarketingClawWatchApp
      - package: MarketingClawKit
      - package: MarketingClawKit
        product: MarketingClawChatUI
      - package: MarketingClawKit
        product: MarketingClawProtocol
      - package: Swabble
        product: SwabbleKit
      - package: WebRTC
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../config/swiftformat" \
            --unexclude "$SRCROOT/Sources,$SRCROOT/ShareExtension,$SRCROOT/ActivityWidget,$SRCROOT/WatchApp,$SRCROOT/../shared/MarketingClawKit,$SRCROOT/../swabble" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "$(MARKETINGCLAW_CODE_SIGN_IDENTITY)"
        CODE_SIGN_ENTITLEMENTS: "$(MARKETINGCLAW_CODE_SIGN_ENTITLEMENTS)"
        CODE_SIGN_STYLE: "$(MARKETINGCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(MARKETINGCLAW_DEVELOPMENT_TEAM)"
        MARKETINGCLAW_ACTIVE_APP_GROUP_ID: "$(MARKETINGCLAW_APP_GROUP_ID)"
        MARKETINGCLAW_APP_DISPLAY_NAME: MarketingClaw
        MARKETINGCLAW_URL_SCHEME: marketingclaw
        PRODUCT_BUNDLE_IDENTIFIER: "$(MARKETINGCLAW_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(MARKETINGCLAW_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          ASSETCATALOG_COMPILER_APPICON_NAME: AppIconDebug
          CODE_SIGN_STYLE: Automatic
          MARKETINGCLAW_ACTIVE_APP_GROUP_ID: "$(MARKETINGCLAW_DEBUG_APP_GROUP_ID)"
          MARKETINGCLAW_APP_DISPLAY_NAME: MarketingClaw
          MARKETINGCLAW_CODE_SIGN_ENTITLEMENTS: Sources/MarketingClaw.entitlements
          MARKETINGCLAW_APNS_ENTITLEMENT_ENVIRONMENT: development
          MARKETINGCLAW_URL_SCHEME: marketingclaw-debug
          PRODUCT_BUNDLE_IDENTIFIER: "$(MARKETINGCLAW_DEBUG_APP_BUNDLE_ID)"
          PROVISIONING_PROFILE_SPECIFIER: ""
          MARKETINGCLAW_PUSH_MODE: localSandbox
          MARKETINGCLAW_PUSH_RELAY_BASE_URL: ""
        Release:
          MARKETINGCLAW_CODE_SIGN_ENTITLEMENTS: Sources/MarketingClaw.entitlements
          MARKETINGCLAW_APNS_ENTITLEMENT_ENVIRONMENT: production
          MARKETINGCLAW_PUSH_MODE: localProduction
          MARKETINGCLAW_PUSH_RELAY_BASE_URL: ""
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: "$(MARKETINGCLAW_APP_DISPLAY_NAME)"
        CFBundleIconName: "$(ASSETCATALOG_COMPILER_APPICON_NAME)"
        CFBundleURLTypes:
          - CFBundleURLName: ai.marketingclaw.app
            CFBundleURLSchemes:
              - "$(MARKETINGCLAW_URL_SCHEME)"
        CFBundleShortVersionString: "$(MARKETINGCLAW_MARKETING_VERSION)"
        MarketingClawCanonicalVersion: "$(MARKETINGCLAW_IOS_VERSION)"
        MarketingClawAppGroupIdentifier: "$(MARKETINGCLAW_ACTIVE_APP_GROUP_ID)"
        CFBundleVersion: "$(MARKETINGCLAW_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - location
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - "$(PRODUCT_BUNDLE_IDENTIFIER).bgrefresh"
        NSLocalNetworkUsageDescription: MarketingClaw discovers and connects to your MarketingClaw gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
          NSAllowsLocalNetworking: true
        NSBonjourServices:
          - _marketclaw-gw._tcp
        NSCameraUsageDescription: MarketingClaw uses the camera when you scan a Gateway setup QR code or ask your paired Gateway or assistant to capture a photo or short video from this iPhone, for example to connect to your Gateway or show your assistant a document, device screen, or workspace.
        NSCalendarsUsageDescription: MarketingClaw uses your calendars to show events and scheduling context when you enable calendar access.
        NSCalendarsFullAccessUsageDescription: MarketingClaw uses your calendars to show events and scheduling context when you enable calendar access.
        NSCalendarsWriteOnlyAccessUsageDescription: MarketingClaw uses your calendars to add events when you enable calendar access.
        NSContactsUsageDescription: MarketingClaw uses your contacts so you can search and reference people while using the assistant.
        NSLocationWhenInUseUsageDescription: MarketingClaw uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: MarketingClaw can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: MarketingClaw uses the microphone for realtime chat, voice wake, push-to-talk, and voice notes.
        NSMotionUsageDescription: MarketingClaw may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: MarketingClaw lets your assistant read photos you allow and lets you choose photos to share.
        PHPhotoLibraryPreventAutomaticLimitedAccessAlert: true
        NSRemindersFullAccessUsageDescription: MarketingClaw uses your reminders to list, add, and complete tasks when you enable reminders access.
        NSSpeechRecognitionUsageDescription: MarketingClaw uses on-device speech recognition for talk mode and voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        UIAppFonts:
          - RedHatDisplay[wght].ttf
          - Inter[opsz,wght].ttf
          - Inter-Italic[opsz,wght].ttf
          - JetBrainsMono-Regular.ttf
          - JetBrainsMono-Medium.ttf
          - JetBrainsMono-SemiBold.ttf
        MarketingClawPushMode: "$(MARKETINGCLAW_PUSH_MODE)"
        MarketingClawPushRelayBaseURL: "$(MARKETINGCLAW_PUSH_RELAY_BASE_URL)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
  MarketingClawShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
      - path: Resources/Localizable.xcstrings
        buildPhase: resources
    dependencies:
      - package: MarketingClawKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "$(MARKETINGCLAW_CODE_SIGN_IDENTITY)"
        CODE_SIGN_ENTITLEMENTS: ShareExtension/MarketingClawShareExtension.entitlements
        CODE_SIGN_STYLE: "$(MARKETINGCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(MARKETINGCLAW_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        MARKETINGCLAW_ACTIVE_APP_GROUP_ID: "$(MARKETINGCLAW_APP_GROUP_ID)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(MARKETINGCLAW_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(MARKETINGCLAW_SHARE_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          MARKETINGCLAW_ACTIVE_APP_GROUP_ID: "$(MARKETINGCLAW_DEBUG_APP_GROUP_ID)"
          PRODUCT_BUNDLE_IDENTIFIER: "$(MARKETINGCLAW_DEBUG_SHARE_BUNDLE_ID)"
          PROVISIONING_PROFILE_SPECIFIER: ""
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: MarketingClaw Share
        CFBundleShortVersionString: "$(MARKETINGCLAW_MARKETING_VERSION)"
        MarketingClawAppGroupIdentifier: "$(MARKETINGCLAW_ACTIVE_APP_GROUP_ID)"
        CFBundleVersion: "$(MARKETINGCLAW_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  MarketingClawActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/MarketingClawActivityAttributes.swift
      - path: Sources/Fonts
        buildPhase: resources
      - path: Resources/Localizable.xcstrings
        buildPhase: resources
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "$(MARKETINGCLAW_CODE_SIGN_IDENTITY)"
        CODE_SIGN_STYLE: "$(MARKETINGCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(MARKETINGCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(MARKETINGCLAW_ACTIVITY_WIDGET_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(MARKETINGCLAW_ACTIVITY_WIDGET_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          PRODUCT_BUNDLE_IDENTIFIER: "$(MARKETINGCLAW_DEBUG_ACTIVITY_WIDGET_BUNDLE_ID)"
          PROVISIONING_PROFILE_SPECIFIER: ""
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: MarketingClaw Activity
        CFBundleShortVersionString: "$(MARKETINGCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(MARKETINGCLAW_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        UIAppFonts:
          - RedHatDisplay[wght].ttf
          - Inter[opsz,wght].ttf
          - Inter-Italic[opsz,wght].ttf
          - JetBrainsMono-Regular.ttf
          - JetBrainsMono-Medium.ttf
          - JetBrainsMono-SemiBold.ttf
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  MarketingClawWatchApp:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
        excludes:
          - Info.plist
      - path: Sources/Services/WatchSessionActivationGate.swift
        group: Sources/Services
      # Universal talk waveform, compiled directly since the watch links no packages.
      - path: ../shared/MarketingClawKit/Sources/MarketingClawChatUI/TalkWaveformView.swift
        group: Shared
      - path: Sources/Fonts
        buildPhase: resources
      - path: Resources/Localizable.xcstrings
        buildPhase: resources
    dependencies:
      - package: MarketingClawKit
      - sdk: AppIntents.framework
      - sdk: AVFAudio.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(MARKETINGCLAW_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(MARKETINGCLAW_CODE_SIGN_STYLE)"
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "$(MARKETINGCLAW_CODE_SIGN_IDENTITY)"
        CODE_SIGN_STYLE: "$(MARKETINGCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(MARKETINGCLAW_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        MARKETINGCLAW_COMPANION_APP_BUNDLE_ID: "$(MARKETINGCLAW_APP_BUNDLE_ID)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(MARKETINGCLAW_WATCH_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(MARKETINGCLAW_WATCH_APP_PROFILE)"
        SWIFT_STRICT_CONCURRENCY: complete
        SWIFT_VERSION: "6.0"
      configs:
        Debug:
          ASSETCATALOG_COMPILER_APPICON_NAME: AppIconDebug
          CODE_SIGN_STYLE: Automatic
          MARKETINGCLAW_COMPANION_APP_BUNDLE_ID: "$(MARKETINGCLAW_DEBUG_APP_BUNDLE_ID)"
          PRODUCT_BUNDLE_IDENTIFIER: "$(MARKETINGCLAW_DEBUG_WATCH_APP_BUNDLE_ID)"
          PROVISIONING_PROFILE_SPECIFIER: ""
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: MarketingClaw
        CFBundleShortVersionString: "$(MARKETINGCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(MARKETINGCLAW_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(MARKETINGCLAW_COMPANION_APP_BUNDLE_ID)"
        WKApplication: true
        WKPrefersNetworkUponForeground: true
        NSLocalNetworkUsageDescription: MarketingClaw connects this Apple Watch directly to your Gateway on trusted local networks.
        UIAppFonts:
          - RedHatDisplay[wght].ttf
          - Inter[opsz,wght].ttf
          - Inter-Italic[opsz,wght].ttf
          - JetBrainsMono-Regular.ttf
          - JetBrainsMono-Medium.ttf
          - JetBrainsMono-SemiBold.ttf

  MarketingClawTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
      - path: WatchApp/Sources/WatchDeferredPayloadOrdering.swift
        group: WatchApp/Sources
    dependencies:
      - target: MarketingClaw
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "$(MARKETINGCLAW_CODE_SIGN_IDENTITY)"
        CODE_SIGN_STYLE: "$(MARKETINGCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(MARKETINGCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(MARKETINGCLAW_APP_BUNDLE_ID).tests"
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MarketingClaw.app/MarketingClaw"
        BUNDLE_LOADER: "$(TEST_HOST)"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: "$(MARKETINGCLAW_DEBUG_APP_BUNDLE_ID).tests"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: MarketingClawTests
        CFBundleShortVersionString: "$(MARKETINGCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(MARKETINGCLAW_BUILD_VERSION)"

  MarketingClawLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
      - path: WatchApp/Sources/WatchVoiceTurnTracker.swift
        group: WatchApp/Sources
    dependencies:
      - package: MarketingClawKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "$(MARKETINGCLAW_CODE_SIGN_IDENTITY)"
        CODE_SIGN_STYLE: "$(MARKETINGCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(MARKETINGCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(MARKETINGCLAW_APP_BUNDLE_ID).logic-tests"
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_EMIT_CONST_VALUE_PROTOCOLS: ""
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: "$(MARKETINGCLAW_DEBUG_APP_BUNDLE_ID).logic-tests"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: MarketingClawLogicTests
        CFBundleShortVersionString: "$(MARKETINGCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(MARKETINGCLAW_BUILD_VERSION)"

  MarketingClawUITests:
    type: bundle.ui-testing
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: UITests
    dependencies:
      - target: MarketingClaw
    settings:
      base:
        CODE_SIGN_IDENTITY: "$(MARKETINGCLAW_CODE_SIGN_IDENTITY)"
        CODE_SIGN_STYLE: "$(MARKETINGCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(MARKETINGCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(MARKETINGCLAW_APP_BUNDLE_ID).ui-tests"
        SDKROOT: iphoneos
        SUPPORTED_PLATFORMS: "iphonesimulator iphoneos"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        TEST_TARGET_NAME: MarketingClaw
        SWIFT_VERSION: "5.0"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: "$(MARKETINGCLAW_DEBUG_APP_BUNDLE_ID).ui-tests"
    info:
      path: UITests/Info.plist
      properties:
        CFBundleDisplayName: MarketingClawUITests
        CFBundleShortVersionString: "$(MARKETINGCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(MARKETINGCLAW_BUILD_VERSION)"
