services:
  - type: web
    name: marketingclaw
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: MARKETINGCLAW_GATEWAY_PORT
        value: "8080"
      - key: MARKETINGCLAW_STATE_DIR
        value: /data/.marketingclaw
      - key: MARKETINGCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: MARKETINGCLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: marketingclaw-data
      mountPath: /data
      sizeGB: 1
