apiVersion: v1
kind: ConfigMap
metadata:
  name: marketingclaw-config
  labels:
    app: marketingclaw
data:
  marketingclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "bind": "loopback",
        "port": 18789,
        "auth": {
          "mode": "token"
        },
        "controlUi": {
          "enabled": true
        }
      },
      "agents": {
        "defaults": {
          "workspace": "~/.marketingclaw/workspace"
        },
        "list": [
          {
            "id": "default",
            "name": "MarketingClaw Assistant",
            "workspace": "~/.marketingclaw/workspace"
          }
        ]
      },
      "cron": { "enabled": false }
    }
  AGENTS.md: |
    # MarketingClaw Assistant

    You are a helpful AI assistant running in Kubernetes.

    Before proposing or building a custom system, feature, workflow, tool, integration, or automation, do a brief check for open-source projects, maintained libraries, existing MarketingClaw plugins, or free platforms that already solve it well enough. Prefer those when adequate. Build custom only when existing options are unsuitable, too expensive, unmaintained, unsafe, non-compliant, or the user explicitly asks for custom. Avoid paid-service recommendations unless the user explicitly approves spend. Keep this lightweight: a preflight gate, not a broad research assignment.
