name: Stale

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions: {}

jobs:
  stale:
    permissions:
      issues: write
      pull-requests: write
    runs-on: ubuntu-24.04
    steps:
      - name: Mark stale unassigned issues and pull requests
        uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-issue-stale: 14
          days-before-issue-close: 7
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: enhancement,maintainer,pinned,security,no-stale,bad-barnacle,clawsweeper:queueable-fix,clawsweeper:source-repro,clawsweeper:fix-shape-clear
          exempt-pr-labels: maintainer,no-stale,bad-barnacle
          operations-per-run: 2000
          ascending: true
          exempt-all-assignees: true
          remove-stale-when-updated: true
          stale-issue-message: |
            This issue has been automatically marked as stale due to inactivity.
            Please add updates or it will be closed.
          stale-pr-message: |
            This pull request has been automatically marked as stale due to inactivity.
            Please add updates or it will be closed.
          close-issue-message: |
            Closing due to inactivity.
            If this is still an issue, please retry on the latest MarketingClaw release and share updated details.
            If you are absolutely sure it still happens on the latest release, open a new issue with fresh steps to reproduce.
          close-issue-reason: not_planned
          close-pr-message: |
            Closing due to inactivity.
            If you believe this PR should be revived, open a new PR referencing this one.
      - name: Mark stale assigned issues
        uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-issue-stale: 30
          days-before-issue-close: 10
          days-before-pr-stale: -1
          days-before-pr-close: -1
          stale-issue-label: stale
          exempt-issue-labels: enhancement,maintainer,pinned,security,no-stale,bad-barnacle,clawsweeper:queueable-fix,clawsweeper:source-repro,clawsweeper:fix-shape-clear
          operations-per-run: 2000
          ascending: true
          include-only-assigned: true
          remove-stale-when-updated: true
          stale-issue-message: |
            This assigned issue has been automatically marked as stale after 30 days of inactivity.
            Please add updates or it will be closed.
          close-issue-message: |
            Closing due to inactivity.
            If this is still an issue, please retry on the latest MarketingClaw release and share updated details.
            If you are absolutely sure it still happens on the latest release, open a new issue with fresh steps to reproduce.
          close-issue-reason: not_planned
      - name: Mark stale assigned pull requests
        uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-issue-stale: -1
          days-before-issue-close: -1
          days-before-pr-stale: 27
          days-before-pr-close: 7
          stale-pr-label: stale
          exempt-pr-labels: maintainer,no-stale,bad-barnacle
          operations-per-run: 2000
          ascending: true
          include-only-assigned: true
          ignore-pr-updates: true
          remove-stale-when-updated: true
          stale-pr-message: |
            This assigned pull request has been automatically marked as stale after being open for 27 days.
            Please add updates or it will be closed.
          close-pr-message: |
            Closing due to inactivity.
            If you believe this PR should be revived, open a new PR referencing this one.

  lock-closed-issues:
    permissions:
      issues: write
    runs-on: ubuntu-24.04
    steps:
      - name: Lock closed issues after 48h of no comments
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const lockAfterHours = 48;
            const lockAfterMs = lockAfterHours * 60 * 60 * 1000;
            const perPage = 100;
            const cutoffMs = Date.now() - lockAfterMs;
            const { owner, repo } = context.repo;

            let locked = 0;
            let inspected = 0;
            let cursor = null;

            while (true) {
              const result = await github.graphql(
                `query ClosedIssuesForLocking(
                  $owner: String!
                  $repo: String!
                  $cursor: String
                  $perPage: Int!
                ) {
                  repository(owner: $owner, name: $repo) {
                    issues(
                      first: $perPage
                      after: $cursor
                      states: CLOSED
                      orderBy: { field: CREATED_AT, direction: ASC }
                    ) {
                      nodes {
                        number
                        locked
                        closedAt
                        comments(last: 1) {
                          nodes {
                            createdAt
                          }
                        }
                      }
                      pageInfo {
                        hasNextPage
                        endCursor
                      }
                    }
                  }
                }`,
                {
                  owner,
                  repo,
                  cursor,
                  perPage,
                },
              );
              const issues = result.repository.issues;

              for (const issue of issues.nodes) {
                if (issue.locked || !issue.closedAt) {
                  continue;
                }

                inspected += 1;
                const closedAtMs = Date.parse(issue.closedAt);
                if (!Number.isFinite(closedAtMs) || closedAtMs > cutoffMs) {
                  continue;
                }

                const lastComment = issue.comments.nodes[0];
                const lastCommentMs = lastComment ? Date.parse(lastComment.createdAt) : 0;
                const lastActivityMs = Math.max(closedAtMs, lastCommentMs || 0);
                if (lastActivityMs > cutoffMs) {
                  continue;
                }

                await github.rest.issues.lock({
                  owner,
                  repo,
                  issue_number: issue.number,
                  lock_reason: "resolved",
                });

                locked += 1;
              }

              if (!issues.pageInfo.hasNextPage || !issues.pageInfo.endCursor) {
                break;
              }
              cursor = issues.pageInfo.endCursor;
            }

            core.info(`Inspected ${inspected} closed issues; locked ${locked}.`);
